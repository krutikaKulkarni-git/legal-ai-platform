services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - REDIS_HOST=cache
      # Add both variations right here:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    depends_on:
      - cache

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"